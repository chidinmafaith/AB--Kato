<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kató Akwete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#432820',
                            hover: '#331e18'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Playfair Display', serif; 
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .text-brand { color: #432820; }
        .bg-brand { background-color: #432820; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RBSH2MKDYF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-RBSH2MKDYF');
    </script>
</head>
<body class="bg-white relative min-h-screen w-full overflow-hidden flex flex-col">
    
    <!-- Header -->
    <div class="bg-brand w-full h-[100px] lg:h-[130px] px-8 md:px-16 z-[40] relative flex items-center shrink-0">
        <h1 class="text-white text-5xl md:text-7xl lg:text-8xl italic font-bold tracking-wider" style="font-family: inherit;">Kató</h1>
    </div>

    <!-- Main Display Area -->
    <!-- Removed max-w limit so the content can spread infinitely to literal screen edges -->
    <div class="relative flex-grow w-full z-[10]">
        
        <!-- Center Text -->
        <!-- Shifted deeply downward on mobile (top-[22%]) to fill the vertical blank space, strictly locked backwards to top-[2%] on md to preserve tablet/desktop perfectly -->
        <div class="absolute top-[22%] md:top-[12%] lg:top-[3%] left-0 right-0 w-full z-[80] flex flex-col items-center justify-start pointer-events-none mx-auto shrink-0 transition-all">
            <h2 class="text-brand text-[20vw] md:text-[140px] lg:text-[280px] xl:text-[320px] font-black leading-[0.75] tracking-wider uppercase m-0 p-0 text-center" style="font-family: inherit;">AKWETE</h2>
            <p class="text-brand text-[4.5vw] md:text-[24px] lg:text-[48px] xl:text-[54px] font-bold italic mt-2 lg:mt-4 leading-tight text-center px-4">
                Woven in Eastern Nigeria, Shipped to your Doorstep
            </p>
        </div>

        <!-- Fabrics Container -->
        <!-- Lifted up to show much more fabric, increased height massively to dominate the middle page, while keeping bottom slightly bitten relative to the border -->
        <div class="absolute bottom-[90px] md:bottom-[160px] lg:bottom-[200px] left-1/2 transform -translate-x-1/2 w-[70%] md:w-[42%] lg:w-[50%] xl:w-[48%] h-[25vh] md:h-[35vh] lg:h-[48vh] flex justify-center items-end z-[20]">
            <!-- Picture 2 (likely Blue/Teal) -->
            <!-- Raised slightly per user request -->
            <img src="./Picture2.png" alt="Akwete fabric" class="shrink-0 w-[55%] lg:w-[65%] h-full object-cover object-top relative z-[10] -mr-[25%] lg:-mr-[30%] transform -translate-y-4 md:-translate-y-8 lg:-translate-y-12 drop-shadow-2xl">
            
            <!-- Picture 3 (Middle Red) -->
            <!-- Raised slightly per user request -->
            <img src="./Picture3.png" alt="Akwete fabric" class="shrink-0 w-[65%] lg:w-[80%] h-full object-cover object-top relative z-[20] transform -translate-y-4 md:-translate-y-8 lg:-translate-y-12 drop-shadow-[0_15px_30px_rgba(0,0,0,0.5)]">
            
            <!-- Picture 4 (Brown/Other) -->
            <img src="./Picture4.png" alt="Akwete fabric" class="shrink-0 w-[55%] lg:w-[65%] h-full object-cover object-top relative z-[10] -ml-[25%] lg:-ml-[30%] drop-shadow-2xl">
        </div>

        <!-- Couple image (Left) -->
        <!-- Hidden completely on phone view (base class), strictly restored on md: and upwards -->
        <img src="./couple.png" alt="Couple in Akwete robe" class="hidden md:block absolute bottom-[10px] md:bottom-[160px] lg:bottom-[40px] left-0 h-[60vh] md:h-[75vh] lg:h-[88vh] xl:h-[95vh] w-auto max-w-[38vw] md:max-w-[38vw] lg:max-w-[40vw] object-contain object-left-bottom z-[50] pointer-events-none drop-shadow-2xl">
        
        <!-- Lady image (Right) -->
        <!-- Scaled to maximum vertical (95vh) on mobile so she reaches the absolute top of the page. Increased max-w to 75vw so her width doesn't choke the height. -->
        <img src="./lady.png" alt="Woman in blue Akwete" class="absolute bottom-[10px] md:bottom-[160px] lg:bottom-[40px] right-0 h-[95vh] md:h-[75vh] lg:h-[88vh] xl:h-[95vh] w-auto max-w-[75vw] md:max-w-[38vw] lg:max-w-[40vw] object-contain object-right-bottom z-[50] pointer-events-none drop-shadow-2xl">

    </div>

    <!-- Solid White Border -->
    <!-- Set slightly taller than the fabrics bottom (200px vs 250px) to bite off exactly ~1-2 inches of the newly raised fabrics uniformly. -->
    <div class="absolute bottom-0 left-0 right-0 w-full h-[120px] md:h-[280px] lg:h-[250px] bg-white z-[60]"></div>

    <!-- Global Button -->
    <a href="waitlist.html" class="absolute bottom-[15px] md:bottom-[80px] lg:bottom-[55px] left-1/2 transform -translate-x-1/2 bg-brand text-white px-6 md:px-12 lg:px-24 py-3 md:py-5 lg:py-6 text-sm md:text-2xl lg:text-4xl font-bold text-center leading-tight hover:bg-[#2d1b15] transition-colors whitespace-nowrap z-[70] flex items-center justify-center pointer-events-auto shadow-2xl">
        Click here for more<br>information
    </a>

</body>
</html>
